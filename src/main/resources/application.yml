spring:
  application:
    name: foreign-word-java
  http:
    converters:
      preferred-json-mapper: jackson2
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  port: 8888

foreign-words:
  provider: ms-foundry   # "ollama" or "ms-foundry"
  phase2:
    llm-worker-count: 1
    llm-queue-capacity: 2000
  ollama:
    base-url: http://localhost:11434
    model: gemma4:e4b
    request-timeout: 240s
  ms-foundry:
    endpoint: https://pt-ai-foundry.services.ai.azure.com/models
    api-key: ${MS_FOUNDRY_API_KEY:}
    model: mistral-medium-2505
    request-timeout: 120s

logging:
  level:
    org:
      springframework: INFO
