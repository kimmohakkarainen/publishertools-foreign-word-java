services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: mistral
    depends_on:
      - ollama

volumes:
  ollama_data: {}
