spring:
  application:
    name: foreign-word-chat
  http:
    converters:
      preferred-json-mapper: jackson2
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  port: 8888

foreign-words:
  provider: ollama   # "ollama" or "ms-foundry"
  ollama:
    base-url: http://localhost:11434
    model: mistral
    request-timeout: 120s
  ms-foundry:
    endpoint: https://<resource>.services.ai.azure.com/models
    api-key: ${MS_FOUNDRY_API_KEY:}
    model: mistral-2505
    request-timeout: 120s

logging:
  level:
    org:
      springframework: DEBUG
